name: Terraform Infrastructure CI/CD
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
    - dev-branch

  pull_request:
    branches:
    - dev-branch

jobs:
  terraform:
    name: Terraform Plan and Apply
    runs-on: self-hosted
    timeout-minutes: 60

    env:
      TF_VAR_vpc_cidr: "10.0.0.0/16"
      TF_VAR_environment: "dev"
      TF_VAR_ec2_instance_type: "t3.micro"
      TF_VAR_autoscaling_group_name: "app-asg"
      TF_VAR_launch_configuration_name: "app-launch-configuration"

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: 1.12.2

    - name: Verify tfplan exists
      run: ls -lah

    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -input=false -out=tfplan


    - name: Terraform Apply
      if: github.ref == 'refs/heads/dev-branch' 
      run: terraform apply -auto-approve tfplan
